  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    :root{
      --bg:#0A0A0A;--surface:#111111;--surface2:#161616;
      --accent:#C8F53E;--muted:#A1A1AA;
      --border:rgba(255,255,255,0.08);
      --border-accent:rgba(200,245,62,0.3);
    }
    body{
      background:var(--bg);color:#F5F5F0;font-family:'DM Sans',sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:1.5rem;overflow-x:hidden;
    }
    a{text-decoration:none;color:inherit}

    .noise{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.03}

    .card{
      position:relative;z-index:1;max-width:520px;width:100%;
      background:var(--surface);border:1px solid var(--border-accent);
      border-radius:24px;padding:2.75rem 2rem;text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
      animation:rise .6s cubic-bezier(.16,1,.3,1);
    }
    @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    .check{
      width:64px;height:64px;border-radius:50%;background:rgba(200,245,62,.1);
      border:1px solid var(--border-accent);display:flex;align-items:center;
      justify-content:center;margin:0 auto 1.5rem;
    }
    .check svg{width:28px;height:28px}

    .tag{
      font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.15em;
      text-transform:uppercase;color:var(--accent);margin-bottom:.85rem;
    }
    h1{
      font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:.02em;
      line-height:1.05;margin-bottom:1rem;
    }
    h1 .co{color:var(--accent)}
    p{color:var(--muted);font-size:.95rem;line-height:1.7;margin-bottom:.5rem}
    p.eta{color:#F5F5F0;font-weight:600}

    .actions{margin-top:2rem;display:flex;flex-direction:column;gap:.75rem}
    .btn{
      display:flex;align-items:center;justify-content:center;gap:.5rem;
      padding:.95rem 1.5rem;border-radius:9999px;font-weight:700;font-size:.9rem;
      transition:opacity .2s,transform .2s;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:var(--accent);color:#0A0A0A}
    .btn-primary:hover{opacity:.9}
    .btn-secondary{
      background:transparent;color:#F5F5F0;border:1px solid var(--border);
    }
    .btn-secondary:hover{background:rgba(255,255,255,.04)}
    .btn svg{width:18px;height:18px}

    .logo-strip{
      margin-top:2.25rem;padding-top:1.5rem;border-top:1px solid var(--border);
      font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.08em;
      color:var(--muted);
    }
    .logo-strip .co{color:var(--accent)}
  </style>
</head>
